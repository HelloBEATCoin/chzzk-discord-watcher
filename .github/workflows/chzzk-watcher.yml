name: Chzzk Watcher

on:
  workflow_dispatch:
  schedule:
    - cron: "7 * * * *"   # Backup schedule. Local launchd triggers the primary 5-minute cadence.

concurrency:
  group: chzzk-watcher-main
  cancel-in-progress: true

jobs:
  run:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: write     # state.json 커밋하려면 write 권한 필요
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install deps
        run: |
          python -m pip install --upgrade pip
          pip install aiohttp pyyaml python-dotenv

      - name: Run watcher once
        env:
          WEBHOOK_MBEUNG: ${{ secrets.WEBHOOK_MBEUNG }}
          WEBHOOK_YEONSOHWA: ${{ secrets.WEBHOOK_YEONSOHWA }}
          WEBHOOK_YEONHU: ${{ secrets.WEBHOOK_YEONHU }}
          WEBHOOK_GYUBI: ${{ secrets.WEBHOOK_GYUBI }}
          STATE_PATH: state.json
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git pull --ff-only origin main

          python monitor_chzzk.py config.yaml --state "$STATE_PATH"

          if ! git diff --quiet -- "$STATE_PATH"; then
            git add "$STATE_PATH"
            git commit -m "chore(state): update at $(date -u +"%Y-%m-%dT%H:%M:%SZ")"
            git pull --rebase origin main
            git push
          else
            echo "No state changes"
          fi
