# Configuration for Chzzk Discord watcher

# Poll interval in seconds for always-on runtimes.
# GitHub Actions schedule is controlled by .github/workflows/chzzk-watcher.yml
# and can be delayed by GitHub's shared scheduler.
poll_interval_seconds: 300

# Viewer thresholds at which to send celebratory messages.  These should be
# ascending numbers.  Modify as desired.
viewer_thresholds: [100, 300, 500, 1000]

# Persist raw viewer count into state.json.
# Keep false to avoid a commit every time live viewer count changes. Threshold
# notifications still work because passed thresholds are persisted separately.
persist_viewer_count: false

# List of streamers to monitor.  Each entry must include:
#   name: Friendly display name used in notifications
#   channel_id: Chzzk channel identifier (GUID-like string)
#   chzzk_url: URL to the channel homepage on chzzk.naver.com
#   webhook_url: Discord webhook URL or placeholder ${ENV_VAR}.
#                Use GitHub Secrets / runtime environment variables in production.
#   discord_role_id: Optional role ID to mention (omit or set null to disable)
streamers:
  - name: 믕비
    channel_id: a872c0594e60f943748d76c565dd3a07
    chzzk_url: https://chzzk.naver.com/a872c0594e60f943748d76c565dd3a07
    webhook_url: ${WEBHOOK_MBEUNG}
    discord_role_id: null
  - name: 연소화
    channel_id: bc630aa88c2753dbac14a09fd4901890
    chzzk_url: https://chzzk.naver.com/bc630aa88c2753dbac14a09fd4901890
    webhook_url: ${WEBHOOK_YEONSOHWA}
    discord_role_id: null
